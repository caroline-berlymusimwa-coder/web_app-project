<h1>📚 Sign In</h1>

<p class="description">
Welcome back to Book Haven! Sign in to explore new arrivals, manage your account, and continue your reading journey.
</p>

<form id="signinForm" novalidate>

    <label for="login">Email Address or Phone Number</label>
    <input type="text" id="login" name="login">
    <p id="loginError" class="error"></p>

    <label for="password">Password</label>
    <input type="password" id="password" name="password">
    <p id="passwordError" class="error"></p>

    <button type="submit">Sign In</button>

    <div class="signup-link">
        Don't have an account?
        <a href="signup.html">Sign Up</a>
    </div>

</form>

<p id="successMessage"></p>

<script src="script.js"></script>
<script>

document.getElementById("signinForm").addEventListener("submit", function(event){

    event.preventDefault();

    document.getElementById("loginError").textContent = "";
    document.getElementById("passwordError").textContent = "";
    document.getElementById("successMessage").textContent = "";

    const login = document.getElementById("login").value.trim();
    const password = document.getElementById("password").value;

    let isValid = true;

    if(login === ""){
        document.getElementById("loginError").textContent = "Email or phone number is required.";
        isValid = false;
    }

    if(password === ""){
        document.getElementById("passwordError").textContent = "Password is required.";
        isValid = false;
    }

    if(!isValid) return;

    // Check against registered users from script.js
    if(users[login] && users[login] === password){

        localStorage.setItem("signedIn", "true");
        localStorage.setItem("email", login);

        document.getElementById("successMessage").textContent =
            "Login successful! Welcome back to Book Haven.";
        document.getElementById("successMessage").className = "success";

        document.getElementById("signinForm").reset();

        setTimeout(function(){
            window.location.href = "contact us.html";
        }, 1500);

    } else {
        document.getElementById("passwordError").textContent =
            "Incorrect email or password. Please sign up first if you don't have an account.";
    }

});

</script>
