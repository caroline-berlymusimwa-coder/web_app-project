<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <body>

<form action="#" method="post" id="signinForm" class="signinForm" autocomplete="on">

    <h2>Sign In</h2>

    <label for="login">Email Address or Phone Number</label>
    <br>
    <input type="text" id="login" name="login" placeholder="Enter email or phone number"> 
    <p id="loginError" class="error"></p>
    </div>

    <div class="field">
        <label for="password">Password</label><br>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
        <p id="passwordError" class="error"></p>
    </div>
    <button type="submit">Sign In</button>
    <p id="successMessage"></p>

</form>

<script>

document.getElementById("signinForm").addEventListener("submit", function(event){

    event.preventDefault();

    const login = document.getElementById("login").value.trim();
    const password = document.getElementById("password").value;

    const users = [
        {
            email: "caroline@gmail.com",
            phone: "0712345678",
            password: "Book123!"
        },
        {
            email: "admin@gmail.com",
            phone: "0798765432",
            password: "Admin123!"
        }
    ];

    let found = false;

    for(let i = 0; i < users.length; i++){

        if(login === users[i].email ||
           login === users[i].phone){

            found = true;

            if(password === users[i].password){

                alert("Welcome to Book Haven!");

                window.location.href = "index.html";

            }else{

                alert("Incorrect password.");

            }

            break;
        }
    }

    if(!found){
        alert("No account found with that email or phone number.");
    }

});

    if(email === ""){
        document.getElementById("emailError").textContent =
            "Email is required.";
        isValid = false;
    }

    else if(!emailPattern.test(email)){
        document.getElementById("emailError").textContent =
            "Please enter a valid email address.";
        isValid = false;
    }

    else if(!validDomains.includes(emailDomain)){
        document.getElementById("emailError").textContent =
            "Allowed domains: " + validDomains.join(", ");
        isValid = false;
    }

    if(password === ""){
        document.getElementById("passwordError").textContent =
            "Password is required.";
        isValid = false;
    }

    else if(password.length < 4){
        document.getElementById("passwordError").textContent =
            "Password must be at least 4 characters long.";
        isValid = false;
    }

    else if(!/[A-Z]/.test(password)){
        document.getElementById("passwordError").textContent =
            "Password must contain at least one uppercase letter.";
        isValid = false;
    }

    else if(!/[a-z]/.test(password)){
        document.getElementById("passwordError").textContent =
            "Password must contain at least one lowercase letter.";
        isValid = false;
    }

    else if(!/\d/.test(password)){
        document.getElementById("passwordError").textContent =
            "Password must contain at least one digit.";
        isValid = false;
    }

    else if(!/[!@#$%^&*(),.?":{}|<>]/.test(password)){
        document.getElementById("passwordError").textContent =
            "Password must contain at least one special character.";
        isValid = false;
    }

    if(isValid){

        document.getElementById("successMessage").textContent =
            "Welcome to Book Haven!";

        document.getElementById("successMessage").className =
            "success";

        // Redirect to Contact Page after 2 seconds

        setTimeout(function(){
            window.location.href = "index.html";
        }, 2000);

    }
;

</script>
</body>
</html>
