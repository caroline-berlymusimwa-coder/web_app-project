```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Haven - Sign In</title>

<style>

/* Page Background */
body{
    margin:0;
    padding:0;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

    background:
    linear-gradient(#00000099,#00000099),
    url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&w=1920&q=80');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* Title */
h1{
    color:white;
    text-transform:uppercase;
    letter-spacing:3px;
    margin-bottom:10px;
    text-shadow:2px 2px 10px #00000080;
}

/* Description */
.description{
    color:#7ba6ce;
    text-align:center;
    max-width:700px;
    margin-bottom:25px;
    line-height:1.6;
}

/* Form */
#signinForm{
    width:450px;
    max-width:90%;

    background:#fffffff2;

    padding:35px;
    border-radius:20px;

    box-shadow:0 8px 30px #00000066;

    backdrop-filter:blur(5px);
}

/* Labels *?
label{
    font-weight:600;
    color:#12054b;
}

/* Inputs */
input{
    width:100%;
    padding:12px;
    margin-top:5px;
    margin-bottom:10px;

    border:2px solid #83a3d4;
    border-radius:10px;

    box-sizing:border-box;
    font-size:15px;

    transition:0.3s;
}

input:focus{
    outline:none;
    border-color:#1d2362;
    box-shadow:0 0 10px #4b76da80;
}

/* Button */
button{
    width:100%;
    padding:14px;

    border:none;
    border-radius:10px;

    background:linear-gradient(
        135deg,
        #102245,
        #5b79b9
    );

    color:white;
    font-size:17px;
    font-weight:bold;

    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 5px 15px #0000004d;
}

/* Error Message */
.error{
    color:#d62828;
    font-size:13px;
    margin-top:-5px;
    margin-bottom:10px;
}

/* Success Message */
.success{
    color:#2a9d8f;
    text-align:center;
    font-size:16px;
    font-weight:bold;
    margin-top:15px;
}

/* Sign Up Link */
.signup-link{
    text-align:center;
    margin-top:15px;
}

.signup-link a{
    color:#34408b;
    text-decoration:none;
    font-weight:bold;
}

.signup-link a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<h1>📚 Sign In</h1>

<p class="description">
Welcome back to Book Haven! Sign in to explore new arrivals, manage your account, and continue your reading journey.
</p>

<form id="signinForm" novalidate>

    <label for="login">Email Address or Phone Number</label>
    <input type="text" id="login" name="login">
    <p id="loginError" class="error"></p>

    <label for="password">Password</label>
    <input type="password" id="password" name="password">
    <p id="passwordError" class="error"></p>

    <button type="submit">Sign In</button>

    <div class="signup-link">
        Don't have an account?
        <a href="signup.html">Sign Up</a>
    </div>

</form>

<p id="successMessage"></p>

<script>

document.getElementById("signinForm").addEventListener("submit", function(event){

    event.preventDefault();

    document.getElementById("loginError").textContent = "";
    document.getElementById("passwordError").textContent = "";
    document.getElementById("successMessage").textContent = "";

    let isValid = true;

    const login = document.getElementById("login").value.trim();
    const password = document.getElementById("password").value;

    if(login === ""){
        document.getElementById("loginError").textContent =
        "Email or phone number is required.";
        isValid = false;
    }

    if(password === ""){
        document.getElementById("passwordError").textContent =
        "Password is required.";
        isValid = false;
    }

    if(isValid){

        document.getElementById("successMessage").textContent =
        "Login successful! Welcome back to Book Haven.";

        document.getElementById("successMessage").className =
        "success";

        document.getElementById("signinForm").reset();

        setTimeout(function(){
            window.location.href = "contact us.html";
        }, 2000);
    }

});

</script>

</body>
</html>
