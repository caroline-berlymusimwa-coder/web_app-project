<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="#" method="post" id="signinForm" class="signinForm" autocomplete="on">
        <h2>sign in  form </Form></h2>
        <div class="field">
            <label for="fullName">Full Name:</label><br>
            <input type="text" id="fullName" name="fullName"><br>
            <p id="fullNameError" class="error"></p>
        </div>
        <div class="field">
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"><br>
            <p id="emailError" class="error"></p>
        </div>
        <div class="field">
            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone"><br>
            <p id="phoneError" class="error"></p>
        </div>
        <div class="field">
            <label for="password">Password:</label><br>
            <input type="password" id="password" value="qweQWE123%" name="password"><br>
            <p id="passwordError" class="error"></p>
        </div>
        <div class="field">
            <label for="confirmPassword">Confirm Password:</label><br>
            <input type="password" id="confirmPassword" value="qweQWE123%" name="confirmPassword"><br>
            <p id="confirmPasswordError" class="error"></p>
        </div>
        <button type="submit">Register</button>
        <p id="successMessage" class="success"></p>
    </form>
 
</body>
</html>
