<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="design.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>/* Arrière-plan de la page */
body{
    margin:0;
    padding:0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

    background:
    linear-gradient(#00000099,
                    #00000099),
    url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?auto=format&fit=crop&w=1920&q=80');

    background-size: cover;
    background-position: center;
    background-attachment: fixed;

    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* Title */
h1{
    color:white;
    text-transform:uppercase;
    letter-spacing:3px;
    margin-bottom:10px;
    text-shadow:2px 2px 10px #00000080;
}

/* Description */
body > p:first-of-type{
    color:#f5f5f5;
    text-align:center;
    max-width:700px;
    margin-bottom:25px;
    line-height:1.6;
}

/* form */
#registrationForm{
    width:450px;
    max-width:90%;

    background:#fffffff2;

    padding:35px;
    border-radius:20px;

    box-shadow:0 8px 30px #00000066;

    backdrop-filter:blur(5px);
}

/* Labels */
label{
    font-weight:600;
    color:#4b2e05;
}

/* Champs */
input{
    width:100%;
    padding:12px;
    margin-top:5px;

    border:2px solid #d4b483;
    border-radius:10px;

    box-sizing:border-box;

    font-size:15px;

    transition:0.3s;
}


input:focus{
    outline:none;

    border-color:#8b5e34;

    box-shadow:0 0 10px #8b5e3480;
}

/* Button*/
button{
    width:100%;
    padding:14px;

    border:none;
    border-radius:10px;

    background:linear-gradient(
        135deg,
        #8b5e34,
        #c89b3c
    );

    color:white;
    font-size:17px;
    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

/* button animation*/
button:hover{
    transform:translateY(-2px);

    box-shadow:0 5px 15px #0000004d;
}

/* error message */
.error{
    color:#d62828;
    font-size:13px;
    margin-top:4px;
    margin-bottom:10px;
}

/*success messages*/
.success{
    color:#2a9d8f;
    text-align:center;
    font-size:16px;
    font-weight:bold;
    margin-top:15px;
}</style>
</head>
<body>
    
    <h1>sign up</h1>
    <p> Join the Book Haven📖 community! Sign up today to receive updates on new arrivals, featured books, special offers, and much more.</p>

    <form id ="registrationForm" >
    <label for="fullName">Name:</label><br>
    <input type="text" id="fullName" name="fullName" required>
    <p id="fullNameError" class="error"></p>
    <br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" required>
    <p id="emailError" class="error"></p>
    
    <br><br>

    <label for="phone">Phone:</label><br>
    <input type="tel" id="phone" name="phone" 
    required>
    <p id="phoneError" class="error"></p>
    <br><br>

    <label for="password">Password:</label><br>
    <input type="password" id="password" name="password" required>
     <p id="passwordError" class="error"></p>

    <br><br>

    <label for="confirm_password">Confirm Password:</label><br>
    <input type="password" id="confirmPassword" name="confirmPassword" required>
     <p id="confirmPasswordError" class="error"></p>

    <br><br>

    <button type="submit">Sign Up</button>

</form>
<p id="successMessage"></p>
<script>

document.getElementById("registrationForm").addEventListener("submit", function(event){

    event.preventDefault();

    document.getElementById("fullNameError").textContent = "";
    document.getElementById("emailError").textContent = "";
    document.getElementById("phoneError").textContent = "";
    document.getElementById("passwordError").textContent = "";
    document.getElementById("confirmPasswordError").textContent = "";
    document.getElementById("successMessage").textContent = "";

    let isValid = true;

    const fullName = document.getElementById("fullName").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    const namePattern = /^[a-zA-Z\s']+$/;
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const phonePattern = /^\+?\d{3,15}$/;

    const validDomains = ["gmail.com","yahoo.com","outlook.com","BHavenedu","o365.BHaven.edu"
    ];

    /* Full Name Validation */

    if(fullName === ""){
        document.getElementById("fullNameError").textContent ="Full name is required.";
        isValid = false;
    }
    else if(fullName.length < 3){
        document.getElementById("fullNameError").textContent ="Full name must be at least 3 characters long.";
        isValid = false;
    }
    else if(!namePattern.test(fullName)){
        document.getElementById("fullNameError").textContent = "Full name can only contain letters, spaces and apostrophes.";
        isValid = false;
    }

    /* Email Validation */

    const emailDomain = email.split("@")[1];

    if(email === ""){
        document.getElementById("emailError").textContent = "Email is required.";
        isValid = false;
    }
    else if(!emailPattern.test(email)){
        document.getElementById("emailError").textContent = "Please enter a valid email address.";
        isValid = false;
    }
    else if(!validDomains.includes(emailDomain)){
        document.getElementById("emailError").textContent = "Allowed domains: " + validDomains.join(", ");
        isValid = false;
    }

    /* Phone Validation */

    if(phone === ""){
        document.getElementById("phoneError").textContent = "Phone number is required.";
        isValid = false;
    }
    else if(!phonePattern.test(phone)){
        document.getElementById("phoneError").textContent = "Enter a valid phone number.";
        isValid = false;
    }

    /* Password Validation */

    if(password === ""){
        document.getElementById("passwordError").textContent = "Password is required.";
        isValid = false;
    }
    else if(password.length < 4){
        document.getElementById("passwordError").textContent = "Password must be at least 4 characters long.";
        isValid = false;
    }
    else if(!/[A-Z]/.test(password)){
        document.getElementById("passwordError").textContent ="Password must contain at least one uppercase letter.";
        isValid = false;
    }
    else if(!/[a-z]/.test(password)){
        document.getElementById("passwordError").textContent ="Password must contain at least one lowercase letter.";
        isValid = false;
    }
    else if(!/\d/.test(password)){
        document.getElementById("passwordError").textContent = "Password must contain at least one digit.";
        isValid = false;
    }
    else if(!/[!@#$%^&*(),.?":{}|<>]/.test(password)){
        document.getElementById("passwordError").textContent = "Password must contain at least one special character.";
        isValid = false;
    }

    /* Confirm Password Validation */

    if(confirmPassword === ""){
        document.getElementById("confirmPasswordError").textContent =
        "Please confirm your password.";
        isValid = false;
    }
    else if(confirmPassword !== password){
        document.getElementById("confirmPasswordError").textContent =
        "Passwords do not match.";
        isValid = false;
    }

    /* Success */

    if(isValid){

        document.getElementById("successMessage").textContent =
        "Registration successful!";

        document.getElementById("successMessage").className =
        "success";

        document.getElementById("registrationForm").reset();

    }

});

</script>

 
</body>
</html>
